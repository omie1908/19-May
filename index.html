<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Riya!</title>
    <style>
        /* Importing aesthetic fonts */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Full screen containers for smooth transitions */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Matrix Canvas Background */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.4;
        }

        /* Text Styling */
        #content-overlay {
            z-index: 5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        #countdown {
            font-family: 'Courier Prime', monospace;
            font-size: 5rem;
            color: #ff80bf;
            text-shadow: 0 0 10px #ff80bf, 0 0 30px #ff007f;
        }

        #hbd-text {
            display: none;
            font-family: 'Courier Prime', monospace;
            font-size: 3rem;
            color: #ff80bf;
            text-shadow: 0 0 10px #ff80bf, 0 0 20px #ff007f;
            letter-spacing: 3px;
            line-height: 1.2;
            animation: fadeInScale 2s ease-out forwards;
        }

        /* Aesthetic font for "Riya" */
        .name {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: #ff3399;
            text-shadow: 0 0 15px #ff3399, 0 0 30px #ff007f;
            display: block;
            margin-top: 10px;
        }

        /* Buttons */
        .aesthetic-btn {
            background: rgba(255, 128, 191, 0.1);
            border: 2px solid #ff80bf;
            color: #ff80bf;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 128, 191, 0.2);
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .aesthetic-btn:hover {
            background: #ff80bf;
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 128, 191, 0.6);
            transform: translateY(-3px);
        }

        #btn-lets-go {
            display: none; /* Will fade in after Happy Birthday text */
            animation: fadeInUp 1.5s ease forwards;
        }

        #btn-lets-celebrate {
            display: none; /* Will show after video ends */
            margin-top: 20px;
            animation: fadeInUp 1s ease forwards;
        }

        /* 9:16 Video Styling */
        video {
            width: 100%;
            max-width: 380px; /* limits width on larger screens to keep it looking like a phone */
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 128, 191, 0.3);
            object-fit: cover;
        }

        /* Animations */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="stage1" class="screen active">
        <canvas id="matrix"></canvas>
        <div id="content-overlay">
            <div id="countdown">3</div>
            <div id="hbd-text">
                HAPPY<br>BIRTHDAY<br>
                <span class="name">Riya</span>
            </div>
            <button id="btn-lets-go" class="aesthetic-btn">Let's Go ✨</button>
        </div>
    </div>

    <div id="stage2" class="screen">
        <video id="vid1" playsinline>
            <source src="video1.mp4" type="video/mp4">
        </video>
        <button id="btn-lets-celebrate" class="aesthetic-btn">Let's Celebrate 🎉</button>
    </div>

    <div id="stage3" class="screen">
        <video id="vid2" playsinline loop>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // --- MATRIX RAIN EFFECT ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: columns }).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(255, 128, 191, 0.5)'; // Pinkish aesthetic text
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- TIMING & TRANSITIONS ---
        
        // 1. Countdown Logic
        setTimeout(() => document.getElementById('countdown').innerText = '2', 1000);
        setTimeout(() => document.getElementById('countdown').innerText = '1', 2000);
        
        // 2. Show HAPPY BIRTHDAY RIYA
        setTimeout(() => {
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('hbd-text').style.display = 'block';
        }, 3000);

        // 3. Show "Let's Go" Button exactly below the text
        setTimeout(() => {
            document.getElementById('btn-lets-go').style.display = 'block';
        }, 5000); // Button appears 2 seconds after the text

        // 4. Click "Let's Go" -> Hide Stage 1, Show Stage 2, Play video1.mp4
        document.getElementById('btn-lets-go').addEventListener('click', () => {
            document.getElementById('stage1').classList.remove('active');
            document.getElementById('stage2').classList.add('active');
            
            let video1 = document.getElementById('vid1');
            video1.play();
        });

        // 5. When video1.mp4 finishes -> Show "Let's Celebrate" Button
        document.getElementById('vid1').addEventListener('ended', () => {
            document.getElementById('btn-lets-celebrate').style.display = 'block';
        });

        // Backup: in case video metadata blocks 'ended' event, force it to show after 21.5 seconds of playing
        document.getElementById('vid1').addEventListener('play', () => {
            setTimeout(() => {
                document.getElementById('btn-lets-celebrate').style.display = 'block';
            }, 21500);
        });

        // 6. Click "Let's Celebrate" -> Hide Stage 2, Show Stage 3, Play video2.mp4
        document.getElementById('btn-lets-celebrate').addEventListener('click', () => {
            document.getElementById('stage2').classList.remove('active');
            document.getElementById('stage3').classList.add('active');
            
            // Pause first video just in case, play the second
            document.getElementById('vid1').pause();
            document.getElementById('vid2').play();
        });

        // Handle window resize for matrix canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
